<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1410;
      --paper: #f5f0e8;
      --cream: #ede7d9;
      --accent: #c0392b;
      --muted: #8a7f72;
      --border: #cfc5b4;
      --shadow: rgba(26,20,16,0.12);
    }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--paper);
      color: var(--ink);
      min-height: 100vh;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.5;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 2rem 3rem;
      display: flex;
      align-items: baseline;
      gap: 1.5rem;
      background: var(--paper);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      letter-spacing: -0.02em;
      color: var(--ink);
    }

    header span {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .upload-bar {
      background: var(--cream);
      border-bottom: 1px solid var(--border);
      padding: 1.5rem 3rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .upload-label {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      background: var(--paper);
      transition: all 0.2s;
    }

    .upload-label:hover { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .upload-label input { display: none; }

    #caption-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink);
      padding: 0.6rem 1rem;
      flex: 1;
      min-width: 200px;
      outline: none;
    }

    #caption-input:focus { border-color: var(--ink); }

    #upload-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: var(--accent);
      color: white;
      border: none;
      padding: 0.65rem 1.5rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    #upload-btn:hover { opacity: 0.85; }
    #upload-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .file-name {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    #progress-bar {
      height: 2px;
      background: var(--accent);
      width: 0;
      transition: width 0.3s;
      margin-top: 0.5rem;
    }

    /* Gallery grid */
    #gallery {
      padding: 3rem;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2.5rem;
    }

    .card {
      background: white;
      border: 1px solid var(--border);
      box-shadow: 4px 4px 0 var(--border);
      display: flex;
      flex-direction: column;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-img-wrap {
      position: relative;
      overflow: hidden;
      aspect-ratio: 4/3;
      background: var(--cream);
    }

    .card-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .card:hover .card-img-wrap img { transform: scale(1.03); }

    .card-body {
      padding: 1.2rem 1.4rem;
      border-top: 1px solid var(--border);
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card-caption {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--ink);
    }

    .card-meta {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    /* Comments */
    .comments-section { display: flex; flex-direction: column; gap: 0.6rem; }

    .comment {
      font-size: 0.72rem;
      line-height: 1.5;
      border-left: 2px solid var(--border);
      padding-left: 0.7rem;
      color: var(--ink);
    }

    .comment strong {
      color: var(--accent);
      font-weight: 400;
      display: block;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 0.1rem;
    }

    .comment-form {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .comment-input {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      border: 1px solid var(--border);
      background: var(--paper);
      color: var(--ink);
      padding: 0.4rem 0.7rem;
      flex: 1;
      outline: none;
    }

    .comment-input:focus { border-color: var(--ink); }

    .comment-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: var(--ink);
      color: var(--paper);
      border: none;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .comment-btn:hover { opacity: 0.7; }

    /* Empty state */
    #empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 6rem 2rem;
      color: var(--muted);
    }

    #empty-state p:first-child {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-style: italic;
      margin-bottom: 0.5rem;
    }

    #empty-state p:last-child { font-size: 0.72rem; letter-spacing: 0.1em; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: var(--ink);
      color: var(--paper);
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      padding: 0.8rem 1.4rem;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s;
      pointer-events: none;
      z-index: 100;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
  </style>
</head>
<body>

<header>
  <h1>Gallery</h1>
  <span>Powered by Firebase</span>
</header>

<div class="upload-bar">
  <label class="upload-label">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    Choose image
    <input type="file" id="file-input" accept="image/*">
  </label>
  <span class="file-name" id="file-name">No file chosen</span>
  <input type="text" id="caption-input" placeholder="Add a caption (optional)…">
  <button id="upload-btn" disabled>Upload</button>
  <div id="progress-bar"></div>
</div>

<div id="gallery">
  <div id="empty-state">
    <p>No images yet.</p>
    <p>Upload one above to get started.</p>
  </div>
</div>

<div id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // =============================================
  // 🔥 PASTE YOUR FIREBASE CONFIG HERE
  // =============================================
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDOIl7RcTMd5AdgumpQavT4gVU4KsaF_VM",
  authDomain: "learnfirebase-b0766.firebaseapp.com",
  projectId: "learnfirebase-b0766",
  storageBucket: "learnfirebase-b0766.firebasestorage.app",
  messagingSenderId: "109847382681",
  appId: "1:109847382681:web:3719ac656afd60b8b84608",
  measurementId: "G-ZT34MMR3H3"
};
  // =============================================

  // =============================================
  // 🖼️ CLOUDINARY CONFIG
  // =============================================
  const CLOUDINARY_CLOUD_NAME = "YOUR_CLOUD_NAME";      // e.g. "dxyz123abc"
  const CLOUDINARY_UPLOAD_PRESET = "YOUR_UPLOAD_PRESET"; // e.g. "ml_default" (must be Unsigned)
  // =============================================

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const fileInput = document.getElementById('file-input');
  const captionInput = document.getElementById('caption-input');
  const uploadBtn = document.getElementById('upload-btn');
  const fileNameEl = document.getElementById('file-name');
  const progressBar = document.getElementById('progress-bar');
  const gallery = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');

  // --- File selection ---
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) {
      fileNameEl.textContent = file.name;
      uploadBtn.disabled = false;
    }
  });

  // --- Upload via Cloudinary ---
  uploadBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    uploadBtn.disabled = true;
    progressBar.style.width = '30%';
    const caption = captionInput.value.trim() || 'Untitled';

    try {
      const formData = new FormData();
      formData.append('file', file);
      formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

      const res = await fetch(
        `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`,
        { method: 'POST', body: formData }
      );

      progressBar.style.width = '80%';
      const data = await res.json();

      if (data.error) throw new Error(data.error.message);

      const url = data.secure_url;

      await addDoc(collection(db, 'images'), {
        url,
        caption,
        createdAt: serverTimestamp()
      });

      captionInput.value = '';
      fileInput.value = '';
      fileNameEl.textContent = 'No file chosen';
      uploadBtn.disabled = true;
      progressBar.style.width = '100%';
      setTimeout(() => { progressBar.style.width = '0'; }, 600);
      showToast('Image uploaded!');
    } catch (err) {
      showToast('Upload failed: ' + err.message);
      uploadBtn.disabled = false;
      progressBar.style.width = '0';
    }
  });

  // --- Real-time gallery listener ---
  const imagesQuery = query(collection(db, 'images'), orderBy('createdAt', 'desc'));

  onSnapshot(imagesQuery, (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === 'added') {
        const img = change.doc.data();
        const id = change.doc.id;
        renderCard(id, img);
      }
    });

    emptyState.style.display = gallery.querySelectorAll('.card').length === 0 ? 'block' : 'none';
  });

  function renderCard(id, imgData) {
    emptyState.style.display = 'none';

    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = id;

    const ts = imgData.createdAt
      ? new Date(imgData.createdAt.seconds * 1000).toLocaleDateString('en-AU', { day: 'numeric', month: 'short', year: 'numeric' })
      : 'Just now';

    card.innerHTML = `
      <div class="card-img-wrap">
        <img src="${imgData.url}" alt="${imgData.caption}" loading="lazy">
      </div>
      <div class="card-body">
        <div class="card-caption">${imgData.caption}</div>
        <div class="card-meta">${ts}</div>
        <div class="comments-section" id="comments-${id}"></div>
        <div class="comment-form">
          <input class="comment-input" placeholder="Leave a comment…" type="text" data-id="${id}">
          <button class="comment-btn" data-id="${id}">Post</button>
        </div>
      </div>
    `;

    gallery.prepend(card);

    // Post comment handler
    const btn = card.querySelector('.comment-btn');
    const input = card.querySelector('.comment-input');

    btn.addEventListener('click', () => postComment(id, input));
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') postComment(id, input); });

    // Real-time comments listener for this image
    const commentsQuery = query(
      collection(db, 'images', id, 'comments'),
      orderBy('createdAt', 'asc')
    );

    onSnapshot(commentsQuery, (snap) => {
      const container = document.getElementById(`comments-${id}`);
      container.innerHTML = '';
      snap.forEach(doc => {
        const c = doc.data();
        const el = document.createElement('div');
        el.className = 'comment';
        const time = c.createdAt
          ? new Date(c.createdAt.seconds * 1000).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' })
          : '';
        el.innerHTML = `<strong>${time}</strong>${escapeHtml(c.text)}`;
        container.appendChild(el);
      });
    });
  }

  async function postComment(imageId, input) {
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    await addDoc(collection(db, 'images', imageId, 'comments'), {
      text,
      createdAt: serverTimestamp()
    });
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
