<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Yendagram — Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111; --panel: #141414;
      --border: rgba(255,255,255,0.07); --text: #e8e4dc;
      --muted: #5a5550; --accent: #c8a96e; --accent-dim: rgba(200,169,110,0.15);
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Instrument Mono', monospace;
      background: var(--bg); color: var(--text);
      display: flex; flex-direction: column;
    }

    /* ── Header ── */
    #msg-header {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0 1.25rem; height: 48px; flex-shrink: 0;
      border-bottom: 1px solid var(--border); background: var(--bg);
    }
    #back-btn {
      background: none; border: none; color: var(--muted);
      cursor: pointer; padding: 0.2rem; transition: color 0.2s; display: none;
    }
    #back-btn:hover { color: var(--accent); }
    #back-btn.visible { display: flex; }
    .header-title {
      font-family: 'Cormorant Garamond', serif; font-size: 1rem;
      font-weight: 300; letter-spacing: 0.18em; text-transform: uppercase;
      flex: 1;
    }
    .header-avatar { width: 26px; height: 26px; border-radius: 50%; border: 1px solid var(--border); display: none; }
    .header-avatar.visible { display: block; }

    /* ── Two-panel layout ── */
    #app { display: flex; flex: 1; overflow: hidden; }

    /* Conversations list */
    #conv-list {
      width: 100%; flex-shrink: 0;
      overflow-y: auto; border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
    }
    #conv-list.hidden { display: none; }

    .conv-item {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.9rem 1.25rem; cursor: pointer;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .conv-item:hover { background: var(--surface); }
    .conv-item.active { background: var(--surface); }
    .conv-avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); flex-shrink: 0; object-fit: cover; }
    .conv-avatar-placeholder {
      width: 36px; height: 36px; border-radius: 50%; background: var(--surface);
      border: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: var(--muted);
    }
    .conv-info { flex: 1; min-width: 0; }
    .conv-name { font-size: 0.72rem; letter-spacing: 0.08em; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .conv-preview { font-size: 0.62rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 0.2rem; }
    .conv-unread { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }

    .no-convs {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--muted); padding: 2rem;
    }
    .no-convs p:first-child { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: rgba(232,228,220,0.2); }
    .no-convs p:last-child { font-size: 0.6rem; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }

    /* ── Chat window ── */
    #chat-window {
      flex: 1; display: none; flex-direction: column; overflow: hidden;
    }
    #chat-window.visible { display: flex; }

    #messages-list {
      flex: 1; overflow-y: auto; padding: 1rem 1.25rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      scrollbar-width: thin; scrollbar-color: var(--border) transparent;
    }

    .msg-bubble {
      max-width: 78%; display: flex; flex-direction: column; gap: 0.15rem;
      animation: bubbleIn 0.2s ease;
    }
    @keyframes bubbleIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

    .msg-bubble.mine { align-self: flex-end; align-items: flex-end; }
    .msg-bubble.theirs { align-self: flex-start; align-items: flex-start; }

    .bubble-text {
      padding: 0.55rem 0.85rem;
      font-family: 'Cormorant Garamond', serif; font-size: 0.95rem; line-height: 1.5;
    }
    .msg-bubble.mine .bubble-text {
      background: var(--accent-dim); border: 1px solid rgba(200,169,110,0.2);
      color: var(--text);
    }
    .msg-bubble.theirs .bubble-text {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text);
    }
    .bubble-time { font-size: 0.55rem; color: var(--muted); letter-spacing: 0.06em; padding: 0 0.2rem; }

    /* Compose bar */
    #compose {
      border-top: 1px solid var(--border); padding: 0.75rem 1.25rem;
      display: flex; gap: 0.6rem; align-items: center; flex-shrink: 0;
    }
    #msg-input {
      font-family: 'Instrument Mono', monospace; font-size: 0.75rem;
      background: var(--surface); border: 1px solid var(--border); color: var(--text);
      padding: 0.55rem 0.9rem; outline: none; flex: 1;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: var(--accent); }
    #msg-input::placeholder { color: var(--muted); }
    #send-btn {
      font-family: 'Instrument Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: var(--accent); color: var(--bg); border: none;
      padding: 0.55rem 1rem; cursor: pointer; font-weight: 600;
      transition: opacity 0.2s; flex-shrink: 0;
    }
    #send-btn:hover { opacity: 0.85; }

    /* Sign-in overlay */
    #signin-overlay {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 1rem; z-index: 10;
    }
    #signin-overlay p { font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic; color: var(--muted); }
    #signin-overlay button {
      font-family: 'Instrument Mono', monospace; font-size: 0.68rem;
      letter-spacing: 0.12em; text-transform: uppercase;
      background: transparent; color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3); padding: 0.5rem 1.2rem;
      cursor: pointer; transition: all 0.2s;
    }
    #signin-overlay button:hover { background: var(--accent-dim); }

    #loading {
      position: absolute; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.65rem; color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;
    }
  </style>
</head>
<body>

<div id="loading">Loading…</div>

<div id="signin-overlay" style="display:none">
  <p>Sign in to use messages</p>
  <button id="signin-btn">Sign in with Google</button>
</div>

<!-- Header -->
<div id="msg-header">
  <button id="back-btn" aria-label="Back">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <img id="header-avatar" class="header-avatar" src="" alt="">
  <div class="header-title" id="header-title">Messages</div>
</div>

<div id="app">
  <!-- Conversations list -->
  <div id="conv-list">
    <div class="no-convs" id="no-convs">
      <p>No messages yet.</p>
      <p>Click "Message" on someone's post to start a conversation</p>
    </div>
  </div>

  <!-- Chat window -->
  <div id="chat-window">
    <div id="messages-list"></div>
    <div id="compose">
      <input id="msg-input" type="text" placeholder="Write a message…">
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp }    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, addDoc, onSnapshot,
           query, orderBy, serverTimestamp, updateDoc, getDocs }
                              from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDOIl7RcTMd5AdgumpQavT4gVU4KsaF_VM",
    authDomain: "learnfirebase-b0766.firebaseapp.com",
    projectId: "learnfirebase-b0766",
    storageBucket: "learnfirebase-b0766.firebasestorage.app",
    messagingSenderId: "109847382681",
    appId: "1:109847382681:web:3719ac656afd60b8b84608"
  };

  const app  = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  const loading       = document.getElementById('loading');
  const signinOverlay = document.getElementById('signin-overlay');
  const convList      = document.getElementById('conv-list');
  const noConvs       = document.getElementById('no-convs');
  const chatWindow    = document.getElementById('chat-window');
  const messagesList  = document.getElementById('messages-list');
  const msgInput      = document.getElementById('msg-input');
  const sendBtn       = document.getElementById('send-btn');
  const backBtn       = document.getElementById('back-btn');
  const headerTitle   = document.getElementById('header-title');
  const headerAvatar  = document.getElementById('header-avatar');

  let me = null;
  let activeConvId = null;
  let unsubMessages = null;
  let unsubConvs = null;

  // ── Helpers ──
  function convId(uid1, uid2) {
    return [uid1, uid2].sort().join('_');
  }

  async function getDisplayName(uid) {
    try {
      const snap = await getDoc(doc(db, 'users', uid));
      if (snap.exists() && snap.data().displayName) return snap.data().displayName;
    } catch(e) {}
    return 'Unknown';
  }

  // ── Auth ──
  onAuthStateChanged(auth, async user => {
    loading.style.display = 'none';
    if (!user) {
      signinOverlay.style.display = 'flex';
      return;
    }
    signinOverlay.style.display = 'none';
    me = user;

    // Load display name
    me._displayName = await getDisplayName(user.uid);

    // Check URL params — open chat directly if launched from "Message" button
    const params = new URLSearchParams(window.location.search);
    const targetUid    = params.get('uid');
    const targetName   = params.get('name');
    const targetAvatar = params.get('avatar');

    loadConversations();

    if (targetUid) {
      openChat(targetUid, targetName, targetAvatar);
    }
  });

  document.getElementById('signin-btn').addEventListener('click', () => {
    signInWithPopup(auth, new GoogleAuthProvider());
  });

  // ── Load conversation list ──
  function loadConversations() {
    if (unsubConvs) unsubConvs();
    unsubConvs = onSnapshot(
      query(collection(db, 'users', me.uid, 'conversations'), orderBy('lastAt', 'desc')),
      snap => {
        // Remove old conv items (keep no-convs div)
        convList.querySelectorAll('.conv-item').forEach(el => el.remove());

        if (snap.empty) {
          noConvs.style.display = 'flex';
          return;
        }
        noConvs.style.display = 'none';

        snap.forEach(d => {
          const data = d.data();
          const item = document.createElement('div');
          item.className = 'conv-item' + (d.id === activeConvId ? ' active' : '');
          item.dataset.uid = data.withUid;

          const avatarHtml = data.withAvatar
            ? `<img class="conv-avatar" src="${esc(data.withAvatar)}" referrerpolicy="no-referrer">`
            : `<div class="conv-avatar-placeholder">${esc((data.withName||'?')[0]).toUpperCase()}</div>`;

          item.innerHTML = `
            ${avatarHtml}
            <div class="conv-info">
              <div class="conv-name">${esc(data.withName || 'Unknown')}</div>
              <div class="conv-preview">${esc(data.lastMsg || '')}</div>
            </div>
            ${data.unread ? '<div class="conv-unread"></div>' : ''}
          `;

          item.addEventListener('click', () => {
            openChat(data.withUid, data.withName, data.withAvatar);
          });

          // Insert before no-convs
          convList.insertBefore(item, noConvs);
        });
      }
    );
  }

  // ── Open a chat ──
  async function openChat(targetUid, targetName, targetAvatar) {
    if (!me) return;
    activeConvId = convId(me.uid, targetUid);
    const myName = me._displayName || me.displayName;

    // Update header
    headerTitle.textContent = targetName || 'Chat';
    if (targetAvatar) {
      headerAvatar.src = targetAvatar;
      headerAvatar.classList.add('visible');
    } else {
      headerAvatar.classList.remove('visible');
    }
    backBtn.classList.add('visible');

    // Show chat, hide list
    convList.classList.add('hidden');
    chatWindow.classList.add('visible');
    messagesList.innerHTML = '';

    // Ensure the top-level conversations doc exists (required for subcollection writes)
    const convDocRef = doc(db, 'conversations', activeConvId);
    await setDoc(convDocRef, {
      participants: [me.uid, targetUid],
      createdAt: serverTimestamp()
    }, { merge: true });

    // Ensure conversation metadata exists on both sides with lastAt so ordering works
    const now = serverTimestamp();
    const myConvRef    = doc(db, 'users', me.uid,   'conversations', activeConvId);
    const theirConvRef = doc(db, 'users', targetUid, 'conversations', activeConvId);
    await setDoc(myConvRef, {
      withUid: targetUid, withName: targetName || 'Unknown',
      withAvatar: targetAvatar || '', unread: false, lastAt: now
    }, { merge: true });
    await setDoc(theirConvRef, {
      withUid: me.uid, withName: myName,
      withAvatar: me.photoURL || '', lastAt: now
    }, { merge: true });

    // Listen to messages in real time
    if (unsubMessages) unsubMessages();

    unsubMessages = onSnapshot(
      query(collection(db, 'conversations', activeConvId, 'messages'), orderBy('createdAt', 'asc')),
      snap => {
        messagesList.innerHTML = '';
        snap.forEach(d => {
          const msg = d.data();
          const isMine = msg.senderUid === me.uid;
          const el = document.createElement('div');
          el.className = `msg-bubble ${isMine ? 'mine' : 'theirs'}`;
          const time = msg.createdAt
            ? new Date(msg.createdAt.seconds * 1000).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' })
            : '';
          el.innerHTML = `
            <div class="bubble-text">${esc(msg.text)}</div>
            <div class="bubble-time">${time}</div>
          `;
          messagesList.appendChild(el);
        });
        messagesList.scrollTop = messagesList.scrollHeight;
      },
      err => console.error('Messages listener error:', err)
    );

    msgInput.focus();

    // Highlight active conv in list
    convList.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.uid === targetUid);
    });
  }

  // ── Send message ──
  async function sendMessage() {
    if (!me || !activeConvId) return;
    const text = msgInput.value.trim();
    if (!text) return;
    msgInput.value = '';

    try {
      // Write the message
      await addDoc(collection(db, 'conversations', activeConvId, 'messages'), {
        text,
        senderUid:  me.uid,
        senderName: me._displayName || me.displayName,
        createdAt:  serverTimestamp()
      });

      // Update preview on both sides
      const myConvRef  = doc(db, 'users', me.uid, 'conversations', activeConvId);
      const myConvSnap = await getDoc(myConvRef);
      const theirUid   = myConvSnap.exists() ? myConvSnap.data().withUid : null;
      const preview    = text.length > 40 ? text.slice(0, 40) + '…' : text;
      const ts         = serverTimestamp();

      await setDoc(myConvRef, { lastMsg: preview, lastAt: ts, unread: false }, { merge: true });

      if (theirUid) {
        const theirConvRef = doc(db, 'users', theirUid, 'conversations', activeConvId);
        await setDoc(theirConvRef, { lastMsg: preview, lastAt: ts, unread: true }, { merge: true });
      }
    } catch(err) {
      console.error('Send error:', err);
      alert('Failed to send: ' + err.message);
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // ── Back button ──
  backBtn.addEventListener('click', () => {
    convList.classList.remove('hidden');
    chatWindow.classList.remove('visible');
    backBtn.classList.remove('visible');
    headerAvatar.classList.remove('visible');
    headerTitle.textContent = 'Messages';
    activeConvId = null;
    if (unsubMessages) { unsubMessages(); unsubMessages = null; }
  });

  function esc(str) {
    if (!str) return '';
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
