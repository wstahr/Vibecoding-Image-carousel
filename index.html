<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Instrument+Mono:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --panel: #141414;
      --border: rgba(255,255,255,0.07);
      --text: #e8e4dc;
      --muted: #5a5550;
      --accent: #c8a96e;
      --accent-dim: rgba(200,169,110,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Instrument Mono', monospace;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Upload drawer */
    #upload-drawer {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      transform: translateY(-100%);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 2rem 2.5rem;
    }

    #upload-drawer.open { transform: translateY(0); }

    .drawer-inner {
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .drawer-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-weight: 300;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .drawer-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .field {
      font-family: 'Instrument Mono', monospace;
      font-size: 0.75rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.55rem 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      flex: 1;
      min-width: 140px;
    }

    .field:focus { border-color: var(--accent); }
    .field::placeholder { color: var(--muted); }

    .file-label {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--text);
      border: 1px solid var(--border);
      padding: 0.55rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .file-label:hover { border-color: var(--accent); color: var(--accent); }
    .file-label input { display: none; }

    #file-name {
      font-size: 0.68rem;
      color: var(--muted);
      font-style: italic;
      flex: 1;
      min-width: 100px;
    }

    .btn-upload {
      font-family: 'Instrument Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--accent);
      color: var(--bg);
      border: none;
      padding: 0.6rem 1.6rem;
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    .btn-upload:hover { opacity: 0.85; }
    .btn-upload:disabled { opacity: 0.3; cursor: not-allowed; }

    #progress {
      height: 1px;
      background: var(--accent);
      width: 0;
      transition: width 0.3s;
    }

    /* Top nav */
    #topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      position: relative;
      z-index: 50;
    }

    .site-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text);
    }

    .nav-right { display: flex; align-items: center; gap: 1.5rem; }

    #counter {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .btn-toggle-upload {
      font-family: 'Instrument Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
      padding: 0.4rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-toggle-upload:hover { background: var(--accent-dim); }

    /* Feed */
    #feed {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }

    #feed::-webkit-scrollbar { display: none; }

    /* Slide */
    .slide {
      height: calc(100dvh - 52px);
      scroll-snap-align: start;
      display: grid;
      grid-template-columns: 1fr 360px;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Image side */
    .slide-image {
      position: relative;
      overflow: hidden;
      background: #050505;
    }

    .slide-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 8s ease;
    }

    .slide:hover .slide-image img { transform: scale(1.03); }

    .slide-meta {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 3rem 2.5rem 2rem;
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, transparent 100%);
    }

    .slide-caption {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      font-style: italic;
      line-height: 1.2;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    .slide-author {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .slide-date {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.08em;
      margin-top: 0.2rem;
    }

    .slide-index {
      position: absolute;
      top: 1.5rem;
      left: 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: rgba(255,255,255,0.25);
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      right: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
      opacity: 0.3;
      animation: bob 2s infinite;
    }

    .scroll-hint span {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: white;
    }

    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(5px); }
    }

    /* Comments panel */
    .slide-panel {
      border-left: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .panel-title {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .comment-count {
      font-size: 0.62rem;
      color: var(--accent);
      letter-spacing: 0.1em;
    }

    .comments-list {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scrollbar-width: thin;
      scrollbar-color: var(--border) transparent;
    }

    .comment-item {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      animation: commentIn 0.3s ease;
    }

    @keyframes commentIn {
      from { opacity: 0; transform: translateX(6px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .comment-header { display: flex; align-items: baseline; gap: 0.6rem; }

    .comment-username {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .comment-time { font-size: 0.58rem; color: var(--muted); }

    .comment-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      line-height: 1.55;
      color: rgba(232,228,220,0.8);
    }

    .no-comments {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.9rem;
      color: var(--muted);
      text-align: center;
      padding: 2rem 0;
    }

    /* Comment form */
    .comment-form {
      border-top: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      flex-shrink: 0;
    }

    .comment-form .field { width: 100%; }

    .form-row { display: flex; gap: 0.5rem; }

    .btn-post {
      font-family: 'Instrument Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      background: transparent;
      color: var(--accent);
      border: 1px solid rgba(200,169,110,0.3);
      padding: 0.5rem 1rem;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .btn-post:hover { background: var(--accent-dim); }

    /* Empty state */
    #empty-state {
      height: calc(100dvh - 52px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: var(--muted);
    }

    #empty-state p:first-child {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2rem;
      font-style: italic;
      font-weight: 300;
      color: rgba(232,228,220,0.15);
    }

    #empty-state p:last-child {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 0.7rem 1.5rem;
      opacity: 0;
      transition: all 0.3s;
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
    }

    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<!-- Upload Drawer -->
<div id="upload-drawer">
  <div class="drawer-inner">
    <div class="drawer-title">New Post</div>
    <div class="drawer-row">
      <input class="field" type="text" id="username-input" placeholder="Your name..." style="max-width:180px">
      <input class="field" type="text" id="caption-input" placeholder="Caption...">
    </div>
    <div class="drawer-row">
      <label class="file-label">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Choose image
        <input type="file" id="file-input" accept="image/*">
      </label>
      <span id="file-name">No file chosen</span>
      <button class="btn-upload" id="upload-btn" disabled>Publish</button>
    </div>
    <div id="progress"></div>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div class="site-title">Gallery</div>
  <div class="nav-right">
    <span id="counter"></span>
    <button class="btn-toggle-upload" id="toggle-btn">+ Upload</button>
  </div>
</div>

<!-- Feed -->
<div id="feed">
  <div id="empty-state">
    <p>Nothing here yet.</p>
    <p>Be the first to post an image</p>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // =============================================
  // PASTE YOUR FIREBASE CONFIG HERE
  // =============================================
const firebaseConfig = {
  apiKey: "AIzaSyDOIl7RcTMd5AdgumpQavT4gVU4KsaF_VM",
  authDomain: "learnfirebase-b0766.firebaseapp.com",
  projectId: "learnfirebase-b0766",
  storageBucket: "learnfirebase-b0766.firebasestorage.app",
  messagingSenderId: "109847382681",
  appId: "1:109847382681:web:3719ac656afd60b8b84608",
  measurementId: "G-ZT34MMR3H3"
};

  // =============================================
  // CLOUDINARY CONFIG
  // =============================================
  const CLOUDINARY_CLOUD_NAME = "dzim2htst";      // e.g. "dxyz123abc"
  const CLOUDINARY_UPLOAD_PRESET = "carousel"; // e.g. "ml_default" (must be Unsigned)

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  const fileInput     = document.getElementById('file-input');
  const captionInput  = document.getElementById('caption-input');
  const usernameInput = document.getElementById('username-input');
  const uploadBtn     = document.getElementById('upload-btn');
  const fileNameEl    = document.getElementById('file-name');
  const progressEl    = document.getElementById('progress');
  const feed          = document.getElementById('feed');
  const emptyState    = document.getElementById('empty-state');
  const counter       = document.getElementById('counter');
  const drawer        = document.getElementById('upload-drawer');
  const toggleBtn     = document.getElementById('toggle-btn');

  // Persist username
  const savedName = localStorage.getItem('gallery-username');
  if (savedName) usernameInput.value = savedName;
  usernameInput.addEventListener('input', () => {
    localStorage.setItem('gallery-username', usernameInput.value.trim());
  });

  // Drawer toggle
  toggleBtn.addEventListener('click', () => {
    drawer.classList.toggle('open');
    toggleBtn.textContent = drawer.classList.contains('open') ? 'x Close' : '+ Upload';
  });

  // File select
  fileInput.addEventListener('change', () => {
    const file = fileInput.files[0];
    if (file) { fileNameEl.textContent = file.name; uploadBtn.disabled = false; }
  });

  // Upload
  uploadBtn.addEventListener('click', async () => {
    const file = fileInput.files[0];
    if (!file) return;

    const username = usernameInput.value.trim() || 'Anonymous';
    const caption  = captionInput.value.trim()  || 'Untitled';

    uploadBtn.disabled = true;
    progressEl.style.width = '25%';

    try {
      const fd = new FormData();
      fd.append('file', file);
      fd.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);

      const res  = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, { method: 'POST', body: fd });
      progressEl.style.width = '75%';
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      await addDoc(collection(db, 'images'), {
        url: data.secure_url, caption, username, createdAt: serverTimestamp()
      });

      captionInput.value = ''; fileInput.value = '';
      fileNameEl.textContent = 'No file chosen';
      uploadBtn.disabled = true;
      progressEl.style.width = '100%';
      setTimeout(() => { progressEl.style.width = '0'; }, 600);
      drawer.classList.remove('open');
      toggleBtn.textContent = '+ Upload';
      showToast('Published');
    } catch (err) {
      showToast('Failed: ' + err.message);
      uploadBtn.disabled = false;
      progressEl.style.width = '0';
    }
  });

  // Real-time feed
  let slideCount = 0;
  const imagesQuery = query(collection(db, 'images'), orderBy('createdAt', 'desc'));

  onSnapshot(imagesQuery, (snapshot) => {
    snapshot.docChanges().forEach((change) => {
      if (change.type === 'added') {
        slideCount++;
        renderSlide(change.doc.id, change.doc.data(), slideCount);
        emptyState.style.display = 'none';
      }
    });
    counter.textContent = slideCount > 0 ? `${slideCount} image${slideCount !== 1 ? 's' : ''}` : '';
  });

  function renderSlide(id, imgData, index) {
    const ts = imgData.createdAt
      ? new Date(imgData.createdAt.seconds * 1000).toLocaleDateString('en-AU', { day: 'numeric', month: 'long', year: 'numeric' })
      : 'Just now';

    const slide = document.createElement('div');
    slide.className = 'slide';
    slide.dataset.id = id;
    const isFirst = index === 1;

    slide.innerHTML = `
      <div class="slide-image">
        <img src="${imgData.url}" alt="${esc(imgData.caption)}" loading="lazy">
        <div class="slide-index">${String(index).padStart(2,'0')}</div>
        <div class="slide-meta">
          <div class="slide-caption">${esc(imgData.caption)}</div>
          <div class="slide-author">&#8212; ${esc(imgData.username || 'Anonymous')}</div>
          <div class="slide-date">${ts}</div>
        </div>
        ${isFirst ? `<div class="scroll-hint"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><polyline points="6 9 12 15 18 9"/></svg><span>Scroll</span></div>` : ''}
      </div>
      <div class="slide-panel">
        <div class="panel-header">
          <span class="panel-title">Comments</span>
          <span class="comment-count" id="count-${id}"></span>
        </div>
        <div class="comments-list" id="comments-${id}">
          <div class="no-comments">No comments yet.</div>
        </div>
        <div class="comment-form">
          <input class="field" type="text" id="name-${id}" placeholder="Your name..." value="${esc(localStorage.getItem('gallery-username') || '')}">
          <div class="form-row">
            <input class="field" type="text" id="text-${id}" placeholder="Write a comment...">
            <button class="btn-post" data-id="${id}">Post</button>
          </div>
        </div>
      </div>
    `;

    const firstSlide = feed.querySelector('.slide');
    firstSlide ? feed.insertBefore(slide, firstSlide) : feed.appendChild(slide);

    // Sync name fields across slides
    const nameField = slide.querySelector(`#name-${id}`);
    nameField.addEventListener('input', () => {
      localStorage.setItem('gallery-username', nameField.value.trim());
      document.querySelectorAll('[id^="name-"]').forEach(f => { f.value = nameField.value; });
      usernameInput.value = nameField.value;
    });

    const textField = slide.querySelector(`#text-${id}`);
    const postBtn   = slide.querySelector('.btn-post');
    postBtn.addEventListener('click', () => postComment(id, nameField, textField));
    textField.addEventListener('keydown', e => { if (e.key === 'Enter') postComment(id, nameField, textField); });

    // Live comments
    onSnapshot(
      query(collection(db, 'images', id, 'comments'), orderBy('createdAt', 'asc')),
      (snap) => {
        const list    = document.getElementById(`comments-${id}`);
        const countEl = document.getElementById(`count-${id}`);
        if (!list) return;
        list.innerHTML = '';
        if (snap.empty) {
          list.innerHTML = '<div class="no-comments">No comments yet.</div>';
          if (countEl) countEl.textContent = '';
          return;
        }
        if (countEl) countEl.textContent = snap.size;
        snap.forEach(doc => {
          const c  = doc.data();
          const el = document.createElement('div');
          el.className = 'comment-item';
          const time = c.createdAt
            ? new Date(c.createdAt.seconds * 1000).toLocaleTimeString('en-AU', { hour: '2-digit', minute: '2-digit' })
            : '';
          el.innerHTML = `
            <div class="comment-header">
              <span class="comment-username">${esc(c.username || 'Anonymous')}</span>
              <span class="comment-time">${time}</span>
            </div>
            <div class="comment-text">${esc(c.text)}</div>
          `;
          list.appendChild(el);
        });
        list.scrollTop = list.scrollHeight;
      }
    );
  }

  async function postComment(imageId, nameField, textField) {
    const text = textField.value.trim();
    if (!text) return;
    const username = nameField.value.trim() || 'Anonymous';
    localStorage.setItem('gallery-username', username);
    textField.value = '';
    await addDoc(collection(db, 'images', imageId, 'comments'), {
      text, username, createdAt: serverTimestamp()
    });
  }

  function esc(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2800);
  }
</script>
</body>
</html>
